services:
  db:
    image: postgres:16-alpine
    container_name: biblioteca-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: biblioteca_user
      POSTGRES_PASSWORD: biblioteca_pass
      POSTGRES_DB: biblioteca
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U biblioteca_user -d biblioteca" ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: biblioteca-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: sync
          path: ./api
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./api/package.json

    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: biblioteca_user
      DB_PASSWORD: biblioteca_pass
      DB_NAME: biblioteca
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: biblioteca-web
    restart: unless-stopped
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: ./web
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./web/package.json

    depends_on:
      - api

volumes:
  pgdata:
